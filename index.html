<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Ponto</title>
<style>
body { font-family: Arial; background:#f4f4f4; }
.container { width: 300px; margin: 50px auto; padding:20px; background:#fff; border-radius:8px; }
button { width:100%; padding:10px; margin-top:10px; }
.hidden { display:none; }
</style>
</head>
<body>

<div id="login" class="container">
<h2>Login</h2>
<input id="email" placeholder="Email"><br>
<input id="senha" type="password" placeholder="Senha"><br>
<button onclick="login()">Entrar</button>
</div>

<div id="ponto" class="container hidden">
<h2>Marcação de Ponto</h2>
<button onclick="marcar('Entrada')">Entrada</button>
<button onclick="marcar('Saída')">Saída</button>
<button onclick="marcar('Almoço Início')">Início Almoço</button>
<button onclick="marcar('Almoço Fim')">Fim Almoço</button>
<button onclick="logout()">Sair</button>
</div>

<div id="admin" class="container hidden">
<h2>Admin Dashboard</h2>
<button onclick="mostrarUsuarios()">Lista de Usuários</button>
<button onclick="criarUsuario()">Criar Usuário</button>
<button onclick="imprimir()">Imprimir Relatório</button>
<button onclick="logout()">Sair</button>
<div id="conteudo"></div>
</div>

<script>
let usuarios = [
 { email: 'admin@admin', senha: '123456', admin: true }
];

let registros = [];

function login() {
 let email = document.getElementById('email').value;
 let senha = document.getElementById('senha').value;
 let user = usuarios.find(u => u.email === email && u.senha === senha);

 if(!user) return alert('Login inválido');

 document.getElementById('login').classList.add('hidden');

 if(user.admin) {
   document.getElementById('admin').classList.remove('hidden');
 } else {
   document.getElementById('ponto').classList.remove('hidden');
 }
}

function logout() {
 location.reload();
}

function marcar(tipo) {
 let data = new Date().toLocaleString();
 registros.push({ tipo, data });
 alert(tipo + ' registrado em ' + data);
}

function mostrarUsuarios() {
 let html = '<h3>Usuários</h3>';
 usuarios.forEach(u => {
   html += `<p>${u.email}</p>`;
 });
 document.getElementById('conteudo').innerHTML = html;
}

function criarUsuario() {
 let email = prompt('Email:');
 let senha = prompt('Senha:');
 if(email && senha) {
   usuarios.push({ email, senha, admin:false });
   alert('Usuário criado');
 }
}

function imprimir() {
 let html = '<h3>Relatório</h3>';
 registros.forEach(r => {
   html += `<p>${r.tipo} - ${r.data}</p>`;
 });
 document.getElementById('conteudo').innerHTML = html;
 window.print();
}
</script>

</body>
</html>
